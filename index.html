<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presto Resto ! 🍔</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="hud">
            <div>💰 Score: <span id="score">0</span></div>
            <div>⏱️ Temps: <span id="timer">45</span>s</div>
        </div>

        <div class="customer-zone">
            <div class="order-bubble" id="orderBubble">Je veux...</div>
            <div class="customer-emoji" id="customerEmoji">👤</div>
        </div>

        <div>
            <div class="kitchen-table" id="plate">🍽️ Assiette vide</div>
            <div class="action-btns">
                <button class="action-btn" id="trashBtn">🗑️ Jeter</button>
                <button class="action-btn" id="serveBtn">🛎️ Servir !</button>
            </div>
        </div>

        <div class="ingredients-grid">
            <button class="ing-btn" data-ing="🍞">🍞 Pain</button>
            <button class="ing-btn" data-ing="🥩">🥩 Steak</button>
            <button class="ing-btn" data-ing="🧀">🧀 Fromage</button>
            <button class="ing-btn" data-ing="🥗">🥗 Salade</button>
        </div>

        <div class="screen" id="startScreen">
            <h2>Presto Resto ! 👨‍🍳</h2>
            <p>Assemble les bons burgers demandés par les clients avant la fin du chrono !</p>
            <button class="start-btn" id="startBtn">Commencer le service</button>
        </div>

        <div class="screen" id="endScreen" style="display: none;">
            <h2>Fin du Service ! ⏰</h2>
            <p>Tu as récolté <strong id="finalScore">0</strong> pièces !</p>
            <p id="loveMessage"></p>
            <button class="start-btn" id="restartBtn">Recommencer</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
